<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学分管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        .hero-section {
            padding: 100px 0 60px;
            color: white;
            text-align: center;
        }
        .hero-section h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .hero-section p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .feature-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            height: 100%;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .feature-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        .btn-primary {
            background: var(--primary-color);
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79,70,229,0.3);
        }
        .btn-outline-light {
            border-radius: 12px;
            padding: 12px 32px;
            font-weight: 600;
        }
        .navbar {
            background: rgba(255,255,255,0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-mortarboard-fill" style="color: var(--primary-color);"></i>
                学分管理系统
            </a>
            <div>
                {% if session.user_id %}
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm me-2">
                        <i class="bi bi-house"></i> 首页
                    </a>
                    <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-box-arrow-right"></i> 退出
                    </a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="btn btn-primary btn-sm">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </a>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-primary btn-sm ms-2">
                        <i class="bi bi-person-plus"></i> 注册
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="hero-section">
        <div class="container">
            <h1><i class="bi bi-mortarboard-fill"></i> 学分管理系统</h1>
            <p>轻松记录、管理你的学分 — 上传证明材料，一键提交，实时查看审核进度</p>
            <div class="mt-4">
                {% if not session.user_id %}
                    <a href="{{ url_for('login') }}" class="btn btn-light btn-lg me-2">
                        <i class="bi bi-box-arrow-in-right"></i> 立即登录
                    </a>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-light btn-lg">
                        <i class="bi bi-person-plus"></i> 注册账号
                    </a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="feature-card">
                    <div class="feature-icon"><i class="bi bi-cloud-upload"></i></div>
                    <h4>上传证明</h4>
                    <p class="text-muted">支持图片、PDF等格式，一键上传学分证明材料，随时随地提交</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <div class="feature-icon"><i class="bi bi-search-heart"></i></div>
                    <h4>自主登记</h4>
                    <p class="text-muted">学生自主登记学分，选择类别（德智体美劳+创新创业），轻松管理</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <div class="feature-icon"><i class="bi bi-bar-chart-line"></i></div>
                    <h4>实时统计</h4>
                    <p class="text-muted">分类查看学分汇总，管理员一键导出Excel，期末统计不再头疼</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
