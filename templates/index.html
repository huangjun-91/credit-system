<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师获奖证书管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4f46e5;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }
        .hero-section {
            padding: 100px 0 60px;
            color: white;
            text-align: center;
        }
        .hero-section h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .hero-section p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .feature-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            height: 100%;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .feature-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        .btn-primary {
            background: var(--primary-color);
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79,70,229,0.3);
        }
        .btn-outline-light {
            border-radius: 12px;
            padding: 12px 32px;
            font-weight: 600;
        }
        .navbar {
            background: rgba(255,255,255,0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-trophy-fill" style="color: var(--primary-color);"></i>
                教师获奖证书管理系统
            </a>
            <div>
                {% if session.user_id %}
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm me-2">
                        <i class="bi bi-house"></i> 首页
                    </a>
                    <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-box-arrow-right"></i> 退出
                    </a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="btn btn-primary btn-sm">
                        <i class="bi bi-box-arrow-in-right"></i> 登录
                    </a>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-primary btn-sm ms-2">
                        <i class="bi bi-person-plus"></i> 注册
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="hero-section">
        <div class="container">
            <h1><i class="bi bi-trophy-fill"></i> 教师获奖证书管理系统</h1>
            <p>轻松登记指导学生获奖信息 — 上传证书图片，选择获奖层次与等级，一键提交审核</p>
            <div class="mt-4">
                {% if not session.user_id %}
                    <a href="{{ url_for('login') }}" class="btn btn-light btn-lg me-2">
                        <i class="bi bi-box-arrow-in-right"></i> 立即登录
                    </a>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-light btn-lg">
                        <i class="bi bi-person-plus"></i> 注册账号
                    </a>
                {% endif %}
            </div>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="feature-card">
                    <div class="feature-icon"><i class="bi bi-image"></i></div>
                    <h4>证书上传</h4>
                    <p class="text-muted">支持图片、PDF等格式，一键上传获奖证书原件，实时提交审核</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <div class="feature-icon"><i class="bi bi-trophy"></i></div>
                    <h4>获奖登记</h4>
                    <p class="text-muted">登记指导学生获奖信息，选择获奖层次（国家/省/市/校）与等级，自动折算学分</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="feature-card">
                    <div class="feature-icon"><i class="bi bi-bar-chart-line"></i></div>
                    <h4>学分统计</h4>
                    <p class="text-muted">按获奖层次汇总折算学分，管理员一键导出Excel，评优评先不再头疼</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
