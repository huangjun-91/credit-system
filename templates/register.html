<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>娉ㄥ唽 - 鏁欏笀鑾峰璇佷功绠＄悊绯荤粺</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .register-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .register-header {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .register-body {
            padding: 2.5rem;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
        }
        .btn-primary {
            background: #059669;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #047857;
        }
        .alert {
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="register-card card">
                    <div class="register-header">
                        <h3><i class="bi bi-person-plus-fill"></i></h3>
                        <h4 class="mb-1">娉ㄥ唽鏂拌处鍙?/h4>
                        <p class="mb-0 small opacity-75">鍔犲叆鏁欏笀鑾峰璇佷功绠＄悊绯荤粺</p>
                    </div>
                    <div class="register-body">
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} alert-dismissible fade show">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-medium"><i class="bi bi-person"></i> 鐢ㄦ埛鍚?*</label>
                                    <input type="text" name="username" class="form-control" placeholder="鐧诲綍鐢ㄧ敤鎴峰悕" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-medium"><i class="bi bi-lock"></i> 瀵嗙爜 *</label>
                                    <input type="password" name="password" class="form-control" placeholder="璁剧疆瀵嗙爜" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-medium"><i class="bi bi-person-badge"></i> 鐪熷疄濮撳悕</label>
                                    <input type="text" name="real_name" class="form-control" placeholder="鐪熷疄濮撳悕">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-medium"><i class="bi bi-qr-code"></i> 宸ュ彿</label>
                                    <input type="text" name="teacher_id" class="form-control" placeholder="鏁欏笀宸ュ彿">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-medium"><i class="bi bi-mortarboard"></i> 鑱岀О</label>
                                    <input type="text" name="title" class="form-control" placeholder="濡傦細鏁欐巿銆佸壇鏁欐巿銆佽甯?>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-medium"><i class="bi bi-building"></i> 鎵€灞炲闄?閮ㄩ棬</label>
                                <input type="text" name="department" class="form-control" placeholder="濡傦細璁＄畻鏈哄闄€佹暀鍔″">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-person-plus"></i> 娉ㄥ唽
                            </button>
                        </form>
                        <div class="text-center mt-3">
                            <span class="text-muted small">宸叉湁璐﹀彿锛?/span>
                            <a href="{{ url_for('login') }}" class="small">鍘荤櫥褰?/a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
